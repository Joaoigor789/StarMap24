<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rastreador de Satélites</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html, body {
height:100%;
margin:0;
padding:0;
}

#map {
height:100vh;
width:100%;
}

.leaflet-control-coordinates{
background:rgba(255,255,255,0.8);
padding:4px 8px;
font-size:12px;
border-radius:4px;
}

.sidebar{
position:absolute;
top:60px;
right:10px;
width:150px;
background:rgba(255,255,255,0.9);
padding:8px;
border-radius:6px;
display:flex;
flex-direction:column;
gap:6px;
z-index:1000;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.sidebar button{
padding:6px;
font-size:12px;
cursor:pointer;
border:none;
background:#2c7be5;
color:white;
border-radius:4px;
}

.sidebar button:hover{
background:#1a5ed8;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="sidebar">
<button onclick="centerMap()">Centralizar Mapa</button>
<button onclick="toggleOrbit()">Mostrar/Ocultar Órbitas</button>
<button onclick="pauseTracking()">Pausar/Retomar</button>
<button onclick="showSatellites()">Lista Satélites</button>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Plugin rotação marcador -->
<script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

<!-- Cálculo orbital -->
<script src="https://unpkg.com/satellite.js/dist/satellite.min.js"></script>

<!-- Sol e Lua -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<!-- Seu script -->
<script src="dun.js"></script>

</body>
</html>
